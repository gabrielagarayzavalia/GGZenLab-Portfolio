name: User Story (Gherkin)
description: Agile user story aligned to a Gherkin feature and acceptance criteria
title: "[Story] "
labels: ["user-story", "type:story"]
body:
  - type: markdown
    attributes:
      value: |
        Map this story to a **Gherkin** file in the repo. Acceptance criteria define the **test boundary**.
        **Required:** label `mini-project:*` + Project field **Proyecto**. See `BACKLOG.md`.
  - type: dropdown
    id: proyecto
    attributes:
      label: Proyecto (board field + mini-project label)
      options:
        - job-hunter → mini-project:job-hunter
        - mapa-corrupcion → mini-project:mapa-corrupcion
        - api-testing → mini-project:api
        - performance → mini-project:perf
        - sql-lab → mini-project:sql-lab
        - labs → mini-project:labs
        - portfolio-skills → mini-project:portfolio
    validations:
      required: true
  - type: input
    id: story_id
    attributes:
      label: Story ID
      placeholder: US-API-ABM
    validations:
      required: true
  - type: input
    id: epic
    attributes:
      label: Parent Epic
      description: Epic issue number or ID (e.g. EPIC-API)
      placeholder: EPIC-API
    validations:
      required: true
  - type: textarea
    id: user_story
    attributes:
      label: User story (As / I want / So that)
      value: |
        **As** a senior QA analyst
        **I want** to validate REST ABM and listing per OpenAPI contract
        **So that** each SUT implementation meets acceptance criteria
    validations:
      required: true
  - type: input
    id: gherkin_file
    attributes:
      label: Gherkin file path
      placeholder: projects/api-testing/gherkin/abm-crud.feature
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria (IDs)
      description: One AC per line — tests must stay within this boundary
      value: |
        - [ ] AC-001: POST valid → 201 + id
        - [ ] AC-002: POST invalid name → 400
        - [ ] AC-003: GET list paginated → 200
    validations:
      required: true
  - type: dropdown
    id: mini_project
    attributes:
      label: Mini-project
      options:
        - api-testing
        - performance-jmeter
        - qa-job-hunter
        - docker
        - cicd-github
        - other
    validations:
      required: true
