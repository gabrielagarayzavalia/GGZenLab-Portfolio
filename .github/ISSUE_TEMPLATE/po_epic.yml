name: Epic (Product Owner)
description: High-level epic for a GGZenLab Product Owner product (AI code-assisted)
title: "[Epic] "
labels: ["epic", "type:epic", "track:po"]
body:
  - type: markdown
    attributes:
      value: |
        **Product Owner epic** — product delivery with AI-assisted coding (Cursor, Ollama, agents).
        Link **User stories** and **PO tasks** in GitHub Projects. Track label: `track:po`.
        **Required:** label `mini-project:*` + Project field **Proyecto** (same catalog). See `BACKLOG.md`.
  - type: dropdown
    id: proyecto
    attributes:
      label: Proyecto (board field + mini-project label)
      description: Set matching label after create, and field Proyecto on GGZenLab QA Portfolio.
      options:
        - job-hunter → mini-project:job-hunter
        - mapa-corrupcion → mini-project:mapa-corrupcion
        - api-testing → mini-project:api
        - performance → mini-project:perf
        - sql-lab → mini-project:sql-lab
        - labs → mini-project:labs
        - portfolio-skills → mini-project:portfolio
    validations:
      required: true
  - type: input
    id: epic_id
    attributes:
      label: Epic ID
      description: e.g. EPIC-JH (QA Job Hunter)
      placeholder: EPIC-JH
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Product goal
      description: What this product delivers for users
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      value: |
        - [ ] User stories + acceptance criteria in GitHub Issues
        - [ ] Runnable code in `projects/`
        - [ ] README + docs subpage (EN/ES)
        - [ ] Demo path (local run or dashboard)
  - type: input
    id: repo_path
    attributes:
      label: Repo path
      placeholder: projects/qa-job-hunter/
